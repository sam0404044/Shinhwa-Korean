          <h1 class="page-title">會員登入</h1>
          <form class="auth-form" action="#" method="post">
            <div class="form-group">
              <label for="login-email">Email</label>
              <input id="login-email" type="text" name="email" required placeholder="請輸入 Email" />

            <div class="form-group">
              <label for="login-password">密碼</label>
              <input id="login-password" type="password" name="password" required placeholder="請輸入密碼" />
            </div>
            <button type="submit" class="btn btn-primary btn--block">登入</button>
            <p class="auth-form__note">
              <a href="forgot-password.html">忘記密碼？</a>
            </p>
            <hr class="auth-form__divider" />
            <p class="auth-form__note">
              <!-- 需手動串接 Google OAuth -->
              <button type="button" class="btn btn-outline btn--block" disabled>Google 快速登入（待串接）</button>
            </p>
            <p class="auth-form__note">
              還沒有帳號？<a href="register.html">立即註冊</a>
            </p>
          </form>
        </div>
