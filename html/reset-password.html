<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>重設密碼 - 神話韓語</title>
    <link rel="icon" type="image/png" href="../assets/images/LOGO/favicon.png" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="../index.html" class="logo"><img src="../assets/images/LOGO/LOGO.png" alt="神話韓語" class="logo__img" /></a>
        <nav class="nav-menu">
          <ul class="nav-list nav-before-login">
            <li><a href="login.html">會員登入</a></li>
            <li><a href="about.html">關於我們</a></li>
            <li><a href="courses.html">課程列表</a></li>
            <li><a href="news.html">最新消息</a></li>
            <li><a href="testimonials.html">學員見證</a></li>
          </ul>
          <div class="nav-actions"><a href="cart.html" class="cart-link" aria-label="購物車">🛒</a></div>
        </nav>
        <button type="button" class="mobile-menu-btn" aria-label="開啟選單">☰</button>
      </div>
    </header>

    <main class="page-main">
      <section class="section auth-section">
        <div class="container container--narrow">
          <h1 class="page-title">設定新密碼</h1>
          <p class="auth-form__desc">請由 Email 中的重設連結進入此頁；連結有效期限依後端設定。</p>
          <form class="auth-form" action="#" method="post">
            <input type="hidden" name="token" value="" />
            <div class="form-group">
              <label for="new-password">新密碼</label>
              <input id="new-password" type="password" name="password" required placeholder="請輸入新密碼" />
            </div>
            <div class="form-group">
              <label for="new-password2">確認新密碼</label>
              <input id="new-password2" type="password" name="password2" required placeholder="再輸入一次" />
            </div>
            <button type="submit" class="btn btn-primary btn--block">重設密碼</button>
            <p class="auth-form__note"><a href="login.html">返回登入</a></p>
          </form>
          <p class="auth-form__hint">※ 此頁需由後端提供 token（網址參數或表單），驗證後才能重設。</p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner container">
        <div class="footer-top">
          <div class="footer-links">
            <a href="#" class="social-link" aria-label="Facebook">Facebook</a>
            <a href="#" class="social-link" aria-label="Instagram">Instagram</a>
          </div>
          <button type="button" class="footer-legal-btn" data-modal="legal">服務使用條款及隱私權聲明</button>
        </div>
        <div class="footer-info">
          <p>@colajp.com</p>
          <p>地址：813高雄市左營區至聖路63號</p>
          <p>電話：075507717</p>
          <p>（待確認）股份有限公司 附設神話韓語補習班</p>
        </div>
      </div>
    </footer>

    <div id="modal-legal" class="modal" role="dialog" aria-labelledby="modal-legal-title" aria-modal="true" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-legal-title">服務使用條款及隱私權聲明</h2>
          <button type="button" class="modal-close" aria-label="關閉">×</button>
        </div>
        <div class="modal-body">
          <nav class="legal-nav">
            <a href="#terms">網站服務使用條款</a>
            <a href="#privacy">隱私權政策</a>
            <a href="#trade">用戶交易條款</a>
            <a href="#refund">退費及退換貨須知</a>
          </nav>
          <div class="legal-content"><p>此處可放置各條款內容。</p></div>
        </div>
      </div>
    </div>
    <script src="../main.js"></script>
  </body>
</html>
