        <nav class="nav-menu">

            <div class="search-wrap"><input type="search" class="search-input" placeholder="搜尋課程、文章" aria-label="搜尋" /><button type="button" class="search-btn" aria-label="搜尋">🔍</button></div>

        <button type="button" class="mobile-menu-btn" aria-label="開啟選單">☰</button>

    <main class="page-main">
      <section class="section auth-section">
        <div class="container container--narrow">
          <h1 class="page-title">建立新帳號</h1>
          <form class="auth-form" action="#" method="post">
            <div class="form-group">
              <label for="reg-name">姓名</label>
              <input id="reg-name" type="text" name="name" required placeholder="請輸入姓名" />
            </div>
            <div class="form-group">
              <label for="reg-email">Email</label>
              <input id="reg-email" type="email" name="email" required placeholder="請輸入 Email" />
            </div>
            <div class="form-group">
              <label for="reg-password">密碼</label>
              <input id="reg-password" type="password" name="password" required placeholder="請設定密碼" />
            </div>
            <div class="form-group">
              <label for="reg-phone">電話</label>
              <input id="reg-phone" type="tel" name="phone" placeholder="選填" />
            </div>
            <button type="submit" class="btn btn-primary btn--block">註冊</button>
            <p class="auth-form__note">已有帳號？<a href="login.html">立即登入</a></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner container">
        <div class="footer-top">
          <div class="footer-links">
            <a href="#" class="social-link" aria-label="Facebook">Facebook</a>

        </div>
      </div>
    </footer>

    <div id="modal-legal" class="modal" role="dialog" aria-labelledby="modal-legal-title" aria-modal="true" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-legal-title">服務使用條款及隱私權聲明</h2>
