        </div>
        <div class="cart-footer">
          <p class="cart-total">合計：NT$ 1,500</p>
          <a href="checkout.html" class="btn btn-primary">選擇付款方式並結帳</a>
        </div>
        <p class="section-hint">購物車資料與結帳流程需串接後端/金流 API。</p>
