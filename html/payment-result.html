<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>付款結果 - 神話韓語</title>
  <link rel="icon" type="image/png" href="../assets/images/LOGO/favicon.png" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo"><img src="../assets/images/LOGO/LOGO.png" alt="神話韓語" class="logo__img" /></a>
      <nav class="nav-menu">
        <ul class="nav-list nav-before-login">
          <li><a href="login.html">會員登入</a></li>
          <li><a href="member.html">會員中心</a></li>
        </ul>
        <div class="nav-actions"><a href="cart.html" class="cart-link">🛒</a></div>
      </nav>
      <button type="button" class="mobile-menu-btn" aria-label="選單">☰</button>
    </div>
  </header>

  <main class="page-main">
    <section class="section">
      <div class="container container--narrow">
        <h1 class="page-title">付款結果</h1>
        <div class="payment-result payment-result--success">
          <p class="payment-result__msg">付款成功！權限已開通。</p>
          <p><a href="member.html#my-courses" class="btn btn-primary">前往我的課程</a></p>
          <p><a href="course-play.html">進入播放頁</a></p>
        </div>
        <div class="payment-result payment-result--fail" hidden>
          <p class="payment-result__msg">付款失敗或已取消。</p>
          <p><a href="checkout.html" class="btn btn-primary">重新付款</a></p>
        </div>
        <p class="section-hint">成功/失敗狀態需由金流回調或後端查詢訂單狀態決定，此頁為版型。</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner container">
      <div class="footer-top">
        <div class="footer-links"><a href="#" class="social-link">Facebook</a><a href="#" class="social-link">Instagram</a></div>
        <button type="button" class="footer-legal-btn" data-modal="legal">服務使用條款及隱私權聲明</button>
      </div>
      <div class="footer-info">
        <p>@colajp.com</p>
        <p>電話：075507717</p>
      </div>
    </div>
  </footer>

  <div id="modal-legal" class="modal" role="dialog" aria-labelledby="modal-legal-title" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-legal-title">服務使用條款及隱私權聲明</h2>
        <button type="button" class="modal-close" aria-label="關閉">×</button>
      </div>
      <div class="modal-body">
        <nav class="legal-nav">
          <a href="#terms">網站服務使用條款</a>
          <a href="#privacy">隱私權政策</a>
          <a href="#trade">用戶交易條款</a>
          <a href="#refund">退費及退換貨須知</a>
        </nav>
        <div class="legal-content"><p>此處可放置各條款內容。</p></div>
      </div>
    </div>
  </div>
  <script src="../main.js"></script>
</body>
</html>
